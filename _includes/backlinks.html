{% assign backlinks_map = site.backlinks %}
{% assign backlinks = nil %}
{% if backlinks_map %}
  {% assign backlinks = backlinks_map[page.url] %}
{% endif %}
{% if backlinks and backlinks.size > 0 %}
  <section class="sidebar-panel">
    <h2 data-i18n="sidebar.backlinks">백링크</h2>
    <ul class="sidebar-list sidebar-list-rich">
      {% for backlink in backlinks %}
        <li>
          <a href="{{ backlink.url | relative_url }}">
            <span class="item-title">{{ backlink.title }}</span>
          </a>
        </li>
      {% endfor %}
    </ul>
  </section>
{% endif %}
