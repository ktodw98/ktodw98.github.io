title: Dev Blog
description: Development posts, architecture choices, and shipping logs.
lang: ko
default_locale: ko
supported_locales: [ko, en, ja, vi]
timezone: Asia/Seoul
url: "https://blog.kailee.dev"
baseurl: ""
permalink: /:year/:month/:day/:title/
image: "/assets/images/og-default.png"
media_baseurl: ""

author:
  name: "Kai Lee"
  headline: "Software Engineer"
  bio: "Building reliable products with clear architecture and practical execution."
  avatar: "/assets/images/gopher.png"
  location: "Seoul, South Korea"
  email: "contact@kailee.dev"
  github_url: "https://github.com/ktodw98"
  linkedin_url: "https://www.linkedin.com/in/kai-dongwon-lee"
  contact_url: "mailto:contact@kailee.dev"

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

show_drafts: false

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      draft: false
      image: "/assets/images/og-default.png"
  - scope:
      path: ""
      type: "pages"
    values:
      image: "/assets/images/og-default.png"

ga4_measurement_id: "G-QL119RJM33"

github:
  owner: "ktodw98"
  repo: "ktodw98.github.io"
  branch: "main"

giscus:
  repo: "ktodw98/ktodw98.github.io"
  repo_id: "R_kgDORiXTrA"
  category: "General"
  category_id: "DIC_kwDORiXTrM4C4BMK"
  mapping: "pathname"
  strict: "0"
  reactions_enabled: "1"
  emit_metadata: "0"
  input_position: "bottom"
  theme: "preferred_color_scheme"
  lang: "ko"

exclude:
  - README.md
  - docs/
  - templates/
