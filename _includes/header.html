<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav class="desktop-nav" aria-label="Global">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/posts/' | relative_url }}">Posts</a>
      <div class="nav-dropdown">
        <a class="nav-dropdown-trigger" href="{{ '/categories/' | relative_url }}" aria-haspopup="true">Categories</a>
        {% assign active_categories = site.data.categories | where: "active", true | sort: "order" %}
        {% if active_categories.size > 0 %}
          <div class="nav-dropdown-menu" aria-label="Category links">
            {% for category in active_categories %}
              <a href="{{ '/categories/' | append: category.id | append: '/' | relative_url }}">
                <span class="nav-dropdown-title">{{ category.label }}</span>
                <span class="nav-dropdown-meta">/{{ category.id }}</span>
              </a>
            {% endfor %}
          </div>
        {% endif %}
      </div>
      <a href="{{ '/series/' | relative_url }}">Series</a>
      <a href="{{ '/resume/' | relative_url }}">Resume</a>
    </nav>
    <div class="header-actions">
      <div class="search-shell">
        <label for="global-search-input" class="sr-only">Search posts</label>
        <div class="search-inline">
          <input
            id="global-search-input"
            class="global-search-input"
            type="search"
            placeholder="Search posts"
            data-search-json="{{ '/search.json' | relative_url }}"
            autocomplete="off">
          <button id="global-search-button" class="search-button" type="button" aria-label="Search">
            Search
          </button>
        </div>
        <ul id="global-search-results" class="global-search-results" hidden></ul>
      </div>
      <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Open menu">
        Menu
      </button>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
        Theme
      </button>
    </div>
  </div>
</header>
