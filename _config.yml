title: Dev Blog
description: Development notes, architecture choices, and shipping logs.
lang: ko
timezone: Asia/Seoul
url: "https://blog.kailee.dev"
baseurl: ""
permalink: /:year/:month/:day/:title/

author:
  name: "Your Name"
  headline: "Software Engineer"
  bio: "Building reliable products with clear architecture and practical execution."
  avatar: "/assets/images/profile-placeholder.svg"
  location: "Seoul, South Korea"
  email: "you@example.com"
  github_url: "https://github.com/ktodw98"
  contact_url: "mailto:you@example.com"

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

show_drafts: false

collections:
  notes:
    output: true
    permalink: /notes/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      draft: false
  - scope:
      path: ""
      type: "notes"
    values:
      layout: "note"
      draft: false

ga4_measurement_id: "G-QL119RJM33"

github:
  owner: "ktodw98"
  repo: "ktodw98.github.io"
  branch: "main"

giscus:
  repo: "ktodw98/ktodw98.github.io"
  repo_id: "R_kgDORiXTrA"
  category: "General"
  category_id: "DIC_kwDORiXTrM4C4BMK"
  mapping: "pathname"
  strict: "0"
  reactions_enabled: "1"
  emit_metadata: "0"
  input_position: "bottom"
  theme: "preferred_color_scheme"
  lang: "ko"

exclude:
  - README.md
  - docs/
