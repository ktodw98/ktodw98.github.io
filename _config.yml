title: Dev Blog
description: Development notes, architecture choices, and shipping logs.
lang: ko
timezone: Asia/Seoul
url: "https://blog.kailee.dev"
baseurl: ""
permalink: /:year/:month/:day/:title/

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

show_drafts: false

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      draft: false

ga4_measurement_id: "G-QL119RJM33"

github:
  owner: "ktodw98"
  repo: "ktodw98.github.io"
  branch: "main"

giscus:
  repo: "ktodw98/ktodw98.github.io"
  repo_id: "R_kgDORiXTrA"
  category: "General"
  category_id: "DIC_kwDORiXTrM4C4BMK"
  mapping: "pathname"
  strict: "0"
  reactions_enabled: "1"
  emit_metadata: "0"
  input_position: "bottom"
  theme: "preferred_color_scheme"
  lang: "ko"

exclude:
  - README.md
  - docs/
