---
layout: default
---
<article class="post note">
  <header class="post-header">
    <p class="eyebrow">Note</p>
    <h1>{{ page.title }}</h1>
    {% if page.tags and page.tags.size > 0 %}
      <p class="meta">{{ page.tags | join: ", " }}</p>
    {% endif %}
    {% if page.description %}
      <p>{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="content-body js-rich-content">
    {{ content }}
  </div>
  {% include edit-link.html %}
  <div class="mobile-only">
    {% include backlinks.html %}
  </div>
</article>
