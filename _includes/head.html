<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>
  {% if page.title %}
    {{ page.title }} | {{ site.title }}
  {% else %}
    {{ site.title }}
  {% endif %}
</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<script>
  window.BLOG_I18N = {
    defaultLocale: {{ site.default_locale | default: "ko" | jsonify }},
    supportedLocales: {{ site.supported_locales | default: "ko,en,ja,vi" | jsonify }},
    messages: {{ site.data.i18n | jsonify }}
  };
  (function () {
    var config = window.BLOG_I18N || {};
    var defaultLocale = config.defaultLocale || "ko";
    var supported = Array.isArray(config.supportedLocales) ? config.supportedLocales : [defaultLocale];
    var locale = defaultLocale;
    try {
      var stored = localStorage.getItem("blog-locale");
      if (stored && supported.indexOf(stored) >= 0) locale = stored;
    } catch (e) {}
    document.documentElement.lang = locale;
    document.documentElement.setAttribute("data-locale", locale);
  })();
</script>
{% if site.github and site.github.build_revision %}
  {% assign asset_version = site.github.build_revision %}
{% else %}
  {% assign asset_version = site.time | date: "%s" %}
{% endif %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ asset_version }}">
<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
{% seo %}
{% if site.ga4_measurement_id and site.ga4_measurement_id != "G-XXXXXXXXXX" %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.ga4_measurement_id }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "{{ site.ga4_measurement_id }}");
  </script>
{% endif %}
